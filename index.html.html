<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Happy Birthday Amahh 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&family=Cherry+Cream+Soda&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0009;
      font-family: 'Lato', sans-serif;
    }

    /* ═══════════════ SPLASH SCREEN ═══════════════ */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: radial-gradient(ellipse at center, #2a0e1f 0%, #0d0009 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 1.2s ease;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    .splash-rose {
      font-size: 52px;
      margin-bottom: 24px;
      animation: floatRose 2.5s ease-in-out infinite;
    }
    @keyframes floatRose {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .splash-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 22px;
      color: rgba(255,255,255,0.85);
      text-align: center;
      line-height: 1.7;
      margin-bottom: 36px;
      padding: 0 32px;
    }

    .splash-tap {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #f9d98a;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* Partikel splash */
    .splash-particle {
      position: absolute;
      border-radius: 50%;
      background: #f9d98a;
      opacity: 0;
      animation: floatParticle linear infinite;
    }
    @keyframes floatParticle {
      0%   { opacity: 0;   transform: translateY(0) scale(0); }
      20%  { opacity: 0.6; }
      100% { opacity: 0;   transform: translateY(-120px) scale(1); }
    }

    /* ═══════════════ SLIDESHOW ═══════════════ */
    #slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center center;
      opacity: 0;
      transition: opacity 1.8s ease-in-out;
    }
    .slide.active {
      opacity: 1;
      animation: kenburns 8s ease-in-out forwards;
    }
    @keyframes kenburns {
      from { transform: scale(1); }
      to   { transform: scale(1.06); }
    }

    /* Slide background diset otomatis oleh JavaScript */

    #overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.40) 0%,
        rgba(0,0,0,0.10) 35%,
        rgba(0,0,0,0.10) 60%,
        rgba(0,0,0,0.65) 100%
      );
      z-index: 1;
    }

    /* ═══════════════ FIREWORKS ═══════════════ */
    #fireworks {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ═══════════════ CONTENT ═══════════════ */
    #content {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      text-align: center;
      opacity: 0;
      transition: opacity 1.5s ease 0.5s;
    }
    #content.show { opacity: 1; }

    .ornament {
      font-size: 20px;
      letter-spacing: 10px;
      color: #f9d98a;
      opacity: 0;
      animation: none;
      margin-bottom: 10px;
    }
    .subtitle-top {
      font-family: 'Cherry Cream Soda', cursive;
      font-size: 14px;
      letter-spacing: 3px;
      color: rgba(249,217,138,0.8);
      opacity: 0;
      margin-bottom: 16px;
    }
    .line {
      width: 55px; height: 1px;
      background: linear-gradient(to right, transparent, #f9d98a, transparent);
      margin: 0 auto 22px;
      opacity: 0;
    }
    .hb-happy {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(32px, 9vw, 42px);
      color: #ffffff;
      line-height: 1;
      opacity: 0;
      text-shadow: 0 0 30px rgba(249,217,138,0.5), 0 2px 10px rgba(0,0,0,0.6);
      margin-bottom: 2px;
    }
    .hb-birthday {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(42px, 12vw, 58px);
      color: #f9d98a;
      line-height: 1;
      opacity: 0;
      text-shadow: 0 0 40px rgba(249,217,138,0.7), 0 2px 12px rgba(0,0,0,0.6);
      margin-bottom: 20px;
    }
    .hb-to {
      font-family: 'DynaPuff', sans-serif;
      font-weight: 300;
      font-size: 15px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(155, 208, 32, 0.65);
      opacity: 0;
      margin-bottom: 6px;
    }
    .hb-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px, 13vw, 56px);
      color: #ffffff;
      text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 2px 10px rgba(0,0,0,0.6);
      opacity: 0;
      margin-bottom: 22px;
    }
    .line2 {
      width: 70px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(249,217,138,0.5), transparent);
      margin: 0 auto 18px;
      opacity: 0;
    }
    .message {
      font-family: 'Cherry Cream Soda', cursive;
      font-size: 14px;
      line-height: 2;
      color: rgba(255,255,255,0.85);
      max-width: 290px;
      opacity: 0;
      margin-bottom: 30px;
    }

    /* Semua animasi konten dipicu JS setelah tap */
    .anim-1 { animation: fadeDown 1.2s ease forwards; }
    .anim-2 { animation: fadeDown 1.2s ease forwards 0.4s; }
    .anim-3 { animation: fadeIn  1.5s ease forwards 0.8s; }
    .anim-4 { animation: fadeUp  1.2s ease forwards 1.2s; }
    .anim-5 { animation: fadeUp  1.2s ease forwards 1.6s; }
    .anim-6 { animation: fadeIn  1.5s ease forwards 2.0s; }
    .anim-7 { animation: fadeUp  1.5s ease forwards 2.4s; }
    .anim-8 { animation: fadeIn  1.5s ease forwards 3.0s; }
    .anim-9 { animation: fadeIn  2.0s ease forwards 3.6s; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Sparkle */
    .sparkle-el {
      position: fixed;
      pointer-events: none;
      z-index: 2;
      animation: sparklePop linear forwards;
      opacity: 0;
    }
    @keyframes sparklePop {
      0%   { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(0.2) translateY(50px); }
    }

    /* Hidden YT */
    #yt-frame {
      position: fixed;
      width: 1px; height: 1px;
      top: -999px; left: -999px;
      opacity: 0; pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" onclick="startExperience()">
    <div class="splash-rose">🌸</div>
    <div class="splash-text">There's Something Special<br/>for you...</div>
    <div class="splash-tap">✦ &nbsp; ..click here.. &nbsp; ✦</div>
  </div>

  <!-- SLIDESHOW — diisi otomatis oleh JavaScript -->
  <div id="slideshow"></div>

  <div id="overlay"></div>
  <canvas id="fireworks"></canvas>

  <!-- KONTEN -->
  <div id="content">
    <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
    <div class="subtitle-top">With so much Love</div>
    <div class="line"></div>
    <div class="hb-happy">Happy</div>
    <div class="hb-birthday">Birthday</div>
    <div class="hb-to">TO</div>
    <div class="hb-name">Amahh</div>
    <div class="line2"></div>
    <div class="message">
      Semoga di usiamu yang indah ini,<br/>
      selalu diberikan kesehatan,<br/>
      kebahagiaan, dan limpahan<br/>
      kasih sayang. Kami mencintaimu. 🌸
    </div>
  </div>

  <div id="yt-frame"></div>

  <script>
    // ╔══════════════════════════════════════════╗
    // ║  GANTI LAGU:                             ║
    // ║  Ambil ID dari link YouTube:             ║
    // ║  https://youtu.be/XXXXXXXX  ← ID-nya ini ║
    // ╚══════════════════════════════════════════╝
    const YOUTUBE_ID = 'apZ-FtdD4VE';


    // ══ Splash particles ══
    const splash = document.getElementById('splash');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'splash-particle';
      const size = 2 + Math.random() * 4;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${10 + Math.random()*80}%;
        bottom:${Math.random()*40}%;
        animation-duration:${2.5 + Math.random()*3}s;
        animation-delay:${Math.random()*3}s;
      `;
      splash.appendChild(p);
    }

    // ╔══════════════════════════════════════════════════════╗
    // ║  DAFTAR FOTO — tambah atau kurangi nama file di sini ║
    // ║  Taruh semua foto di dalam folder  photos/           ║
    // ╚══════════════════════════════════════════════════════╝
    const PHOTOS = [
      'foto1.jpeg',
      'foto2.jpeg',
      'foto3.jpeg',
      'foto4.jpeg',
      'foto5.jpeg',
      'foto6.jpeg',
      'foto7.jpeg',
      'foto8.jpeg',
      'foto9.jpeg',
      'foto10.jpeg',
      'foto11.jpeg',
      'foto12.jpeg',
      'foto13.jpeg',
      'foto14.jpeg',
      'foto15.jpeg',
      'foto16.jpeg',
      'foto17.jpeg',
      // Tambah foto baru di sini, contoh:
      // 'foto18.jpeg',
    ];

    // ══ slide otomatis dari daftar foto ══
    const slideshowEl = document.getElementById('slideshow');
    PHOTOS.forEach((filename, i) => {
      const div = document.createElement('div');
      div.className = 'slide' + (i === 0 ? ' active' : '');
      div.style.backgroundImage = `url('photos/${filename}')`;
      div.style.backgroundColor = ['#2d1b2e','#1b2d2e','#2e2d1b','#1b1b2e','#2e1b1b',
                                    '#1b2e1b','#2e2e1b','#1b2e2e','#2e1b2e','#2e1b20',
                                    '#1a2e1b','#2e1a2a'][i % 12];
      slideshowEl.appendChild(div);
    });

    // ══ Slideshow ══
    const slides = document.querySelectorAll('.slide');
    let cur = 0;
    function nextSlide() {
      slides[cur].classList.remove('active');
      cur = (cur + 1) % slides.length;
      slides[cur].classList.add('active');
    }
    setInterval(nextSlide, 8000);

    // ══ Fireworks ══
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const COLORS = [
      '#f9d98a','#ffd700','#ffc94a','#ffb347',
      '#ffccd5','#ff9eb5','#ffb6c1',
      '#ffe4e1','#ffffff','#fff5e4',
      '#e8c4b8','#d4af95'
    ];

    class Trail {
      constructor() {
        this.x = canvas.width * 0.15 + Math.random() * canvas.width * 0.70;
        this.y = canvas.height;
        this.targetY = canvas.height * 0.08 + Math.random() * canvas.height * 0.42;
        this.speed = 9 + Math.random() * 7;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.done = false;
      }
      update() {
        this.y -= this.speed;
        if (this.y <= this.targetY) { this.done = true; explode(this.x, this.targetY); }
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 12; ctx.shadowColor = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, 2.2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    class Particle {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.2 + Math.random() * 4.5;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.alpha = 1;
        this.decay = 0.010 + Math.random() * 0.014;
        this.radius = 1.3 + Math.random() * 1.8;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.055; this.vx *= 0.985;
        this.alpha -= this.decay;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 7; ctx.shadowColor = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    let trails = [], particles_fw = [];
    let fireworksActive = false;

    function explode(x, y) {
      const count = 65 + Math.floor(Math.random() * 55);
      for (let i = 0; i < count; i++) particles_fw.push(new Particle(x, y));
    }

    function launch() {
      if (!fireworksActive) return;
      trails.push(new Trail());
      if (Math.random() < 0.35) setTimeout(() => trails.push(new Trail()), 350);
      setTimeout(launch, 1300 + Math.random() * 1900);
    }

    function fwLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      trails = trails.filter(t => !t.done);
      trails.forEach(t => { t.update(); t.draw(); });
      particles_fw = particles_fw.filter(p => p.alpha > 0.01);
      particles_fw.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(fwLoop);
    }
    fwLoop();

    // ══ Sparkle ══
    const sparkleChars = ['✦','✧','·','*','✺','❋','✿'];
    let sparkleActive = false;
    function spawnSparkle() {
      if (!sparkleActive) return;
      const el = document.createElement('span');
      el.className = 'sparkle-el';
      el.textContent = sparkleChars[Math.floor(Math.random() * sparkleChars.length)];
      el.style.cssText = `
        left:${5+Math.random()*88}vw;
        top:${8+Math.random()*78}vh;
        font-size:${10+Math.random()*14}px;
        color:${COLORS[Math.floor(Math.random()*COLORS.length)]};
        animation-duration:${1.8+Math.random()*2.2}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
      setTimeout(spawnSparkle, 550);
    }

    // ══ YouTube ══
    let player = null, apiReady = false;
    const ytScript = document.createElement('script');
    ytScript.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(ytScript);

    window.onYouTubeIframeAPIReady = function () {
      apiReady = true;
      player = new YT.Player('yt-frame', {
        height: '1', width: '1',
        videoId: YOUTUBE_ID,
        playerVars: {
          autoplay: 0, loop: 1,
          playlist: YOUTUBE_ID,
          controls: 0, playsinline: 1,
          rel: 0, modestbranding: 1, iv_load_policy: 3
        },
        events: {
          onReady: function(e) { e.target.setVolume(82); }
        }
      });
    };

    // ══ START EXPERIENCE (tap splash) ══
    let started = false;
    function startExperience() {
      if (started) return;
      started = true;

      // Sembunyikan splash
      splash.classList.add('hide');
      setTimeout(() => splash.style.display = 'none', 1300);

      // Tampilkan konten
      const content = document.getElementById('content');
      content.classList.add('show');

      // Trigger animasi elemen satu per satu
      const anims = [
        ['.ornament',      'anim-1'],
        ['.subtitle-top',  'anim-2'],
        ['.line',          'anim-3'],
        ['.hb-happy',      'anim-4'],
        ['.hb-birthday',   'anim-5'],
        ['.hb-to',         'anim-6'],
        ['.hb-name',       'anim-7'],
        ['.line2',         'anim-8'],
        ['.message',       'anim-9'],
      ];
      anims.forEach(([sel, cls]) => {
        document.querySelector(sel).classList.add(cls);
      });

      // Aktifkan kembang api & sparkle
      fireworksActive = true;
      sparkleActive = true;
      launch();
      spawnSparkle();

      // Putar musik
      if (apiReady && player) {
        player.playVideo();
      } else {
        // Tunggu API siap lalu play
        const interval = setInterval(() => {
          if (apiReady && player) {
            player.playVideo();
            clearInterval(interval);
          }
        }, 300);
      }
    }
  </script>
</body>
</html>
